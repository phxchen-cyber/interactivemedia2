<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiments</title>
</head>

<body>
    <h1>Experiment 1</h1>
    <h2> Open the console to see the functionality of the code.</h2>

    <script>

        // My program asks users to input the a sound that a dog or cat makes and if the user inputs the correct answer, the console will log "yes that's skibidi bop yes yes yes". If the user inputs the wrong answer, the console will log "no no no that's not funny do it again".

        // sequence
        var selectedSound = prompt("What sounds do a dog or cat make?", "").toLowerCase();
        // loop
        for (var i = 0; i < selectedSound.length; i++) {
            // selection
            if (selectedSound === "woof" || selectedSound === "bark" || selectedSound === "meow" || selectedSound === "mew") {
                console.log("yes that's skibidi bop yes yes yes");
            }
            else {
                console.log("no no no that's not funny do it again");
            }
        }

    </script>

</body>

</html>
